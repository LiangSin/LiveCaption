global
    log stdout format raw local0
    maxconn 4096
    user haproxy
    group haproxy
    chroot /
    stats socket /tmp/haproxy.sock mode 660 level admin
    tune.ssl.default-dh-param 2048

defaults
    log global
    mode http
    option logasap
    option dontlognull
    log-format 'asr_proxy route client=%ci server=%s addr=%si:%sp status=%ST sessions=%sc'
    # If the initially selected server is saturated, try another available ASR
    # backend before letting the request fail in the queue.
    option redispatch 1
    retries __ASR_RETRIES__
    # Health checks use min(connect, inter) for the connect phase.
    # Remote backends (e.g. vast.ai) need more headroom than LAN peers.
    timeout connect 20s
    timeout check 15s
    timeout client 86400s
    timeout server 86400s
    timeout tunnel 86400s
    # If every backend is at maxconn, fail quickly instead of hiding the issue
    # behind a long queue.
    timeout queue 250ms

frontend asr_wss
    bind :9001 ssl crt /tmp/asr_proxy.pem
    no log

    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-For %[src]
    http-request set-header X-ASR-Proxy frontend=asr_wss

    acl is_health path -i /health
    http-request return status 200 content-type text/plain lf-string "ok\n" if is_health

    acl is_asr path_beg /asr
    http-request return status 404 content-type text/plain lf-string "not found\n" unless is_asr

    default_backend asr_backends
