worker_processes auto;

events {
    worker_connections 4096;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    log_format upstream 'client=$remote_addr time="$time_local" '
                        'request="$request" status=$status bytes=$body_bytes_sent '
                        'upstream="$upstream_addr" upstream_status="$upstream_status" '
                        'request_time=$request_time upstream_time="$upstream_response_time" '
                        'connection=$connection connection_requests=$connection_requests';

    access_log /dev/stdout upstream;
    error_log /dev/stderr info;

    upstream asr_backends {
        zone asr_backends 64k;
        least_conn;

        include /etc/nginx/asr_backends.conf;
    }

    server {
        # TLS termination: the relay connects here over wss:// and intentionally
        # skips certificate verification for this internal ASR connection.
        listen 9001 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location /asr {
            # Re-encrypt to the backend: the real ASR backend only accepts wss.
            proxy_pass https://asr_backends;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Backends use a private self-signed cert and are addressed by IP;
            # skip upstream verification (matches the repo's other internal
            # proxy_pass blocks in nginx/nginx.conf).
            proxy_ssl_verify off;

            proxy_connect_timeout 5s;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;

            # Retry only before a WebSocket connection is established.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
    }
}
