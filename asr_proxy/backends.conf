# ASR backend WebSocket endpoints for HAProxy.
# After changing this file, restart or reload asr_proxy.
#
# On-campus (low latency):
#   server <name> <host:port> ssl verify none maxconn <limit> check no-check-ssl sni str(<hostname>)
#
# Off-campus (high latency):
#   server <name> <host:port> ssl verify none maxconn <limit> check no-check-ssl sni str(<sni>) inter 20s fall 3 rise 2
backend asr_backends
    log global
    balance leastconn
    http-reuse never
    default-server inter 10s fall 2 rise 2

    # server asr_vast_1 xx.xx.xx.xx:xxxx ssl verify none maxconn 8 check no-check-ssl sni str(whisperlivekit) inter 20s fall 3 rise 2
    server asr_cool_parrot cool-parrot.mvnl.csie.ntu.edu.tw:8000 ssl verify none maxconn 4 check no-check-ssl sni str(cool-parrot.mvnl.csie.ntu.edu.tw)
