services:
  ome:
    container_name: ome
    image: airensoft/ovenmediaengine:latest
    init: true
    environment:
      OME_HOST_IP: 140.112.91.219
    depends_on:
      - nginx
    volumes:
      - ./ome-server/Server.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml
      - ./ssl-config/:/opt/ovenmediaengine/bin/ssl-config/

  nginx:
    container_name: nginx
    image: tiangolo/nginx-rtmp:latest
    ports:
      - "1935:1935"      # RTMP
      - "8088:8088"      # Frontend
    volumes:
      - ./ssl-config:/etc/nginx/ssl:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  relay_service:
    container_name: relay_service
    build:
      context: .
      dockerfile: relay_service/Dockerfile
    depends_on:
      - nginx
    env_file:
      - relay_service/.env

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    volumes:
      - ./ssl-config:/ssl-config:ro
    depends_on:
      - nginx
    env_file:
      - frontend/.env

