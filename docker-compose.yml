services:
  ome:
    container_name: ome
    image: airensoft/ovenmediaengine:latest
    # init: true
    environment:
      OME_HOST_IP: 140.112.91.219
    volumes:
      - ./ome-server/Server.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml
      - ./ssl-config/:/opt/ovenmediaengine/bin/ssl-config/

  monitor_service:
    container_name: monitor_service
    build:
      context: .
      dockerfile: monitor_service/Dockerfile
    env_file:
      - monitor_service/.env
    volumes:
      - ./monitor_service/monitor_config.json:/app/monitor_config.json:ro

  monitor_client:
    container_name: monitor_client
    build:
      context: .
      dockerfile: monitor_client/Dockerfile
    env_file:
      - monitor_client/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitor_client/probes.json:/app/probes.json:ro
    depends_on:
      - monitor_service
    restart: unless-stopped

  nginx:
    container_name: nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "1935:1935"      # RTMP
      - "443:443"        # Frontend (HTTPS)
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/allowed_networks.conf:/etc/nginx/allowed_networks.conf:ro
      - ./nginx/monitor.html:/usr/share/nginx/html/monitor.html:ro
    depends_on:
      - ome
      - relay_service
      - frontend
      - monitor_service
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --no-check-certificate https://127.0.0.1:443/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  relay_service:
    container_name: relay_service
    build:
      context: .
      dockerfile: relay_service/Dockerfile
    env_file:
      - relay_service/.env

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    volumes:
      - ./ssl-config:/ssl-config:ro
      - ./auth_keys.json:/app/frontend/auth_keys.json:ro
    env_file:
      - frontend/.env

