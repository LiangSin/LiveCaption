user www-data;
worker_processes 1;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

# Expose AUTH_SECRET (from the container environment) to njs; must match
# the secret used by frontend/serve_https.py to sign auth cookies.
env AUTH_SECRET;

events {
        worker_connections 768;
}

http {

        ##
        # Basic Settings
        ##

        sendfile on;
        tcp_nopush on;
        types_hash_max_size 2048;
        # server_tokens off;

        # server_names_hash_bucket_size 64;
        # server_name_in_redirect off;

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
        ssl_prefer_server_ciphers on;

        access_log /var/log/nginx/access.log;

        gzip on;

        ##
        # Rate Limiting
        ##
        limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
        limit_req_zone $binary_remote_addr zone=register_limit:10m rate=10r/m;
        limit_req_status 429;

        include /etc/nginx/conf.d/*.conf;
        include /etc/nginx/sites-enabled/*;

        js_import auth from /etc/nginx/njs/auth.js;

        # Keep connections to OME alive: LL-HLS issues several requests per
        # second per viewer, so per-request connection setup is pure waste.
        upstream ome_llhls {
            server ome:8888;
            keepalive 16;
        }

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;
        include /etc/nginx/allowed_networks.conf;
        
        ssl_certificate /etc/letsencrypt/live/cool-parrot.mvnl.csie.ntu.edu.tw/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cool-parrot.mvnl.csie.ntu.edu.tw/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Verify auth cookie in-process (njs). The LL-HLS player issues
        # several requests per second per viewer; validating the HMAC cookie
        # here keeps the media path free of per-request upstream auth calls.
        location = /_auth_verify {
            internal;
            js_content auth.verify;
        }

        # Auth login endpoint
        location = /auth/login {
            limit_req zone=auth_limit burst=2 nodelay;
            proxy_pass https://frontend:8088/auth/login;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # OME HLS Stream
        location /live/ {
            auth_request /_auth_verify;
            proxy_pass http://ome_llhls/live/;
            proxy_http_version 1.1;
            # Empty Connection header enables upstream keepalive reuse.
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Stream LL-HLS parts through as OME produces them instead of
            # holding them in proxy buffers.
            proxy_buffering off;
        }
        
        # Relay Service: session registration (POST /register?src=<key>)
        location /register {
            auth_request /_auth_verify;
            limit_req zone=register_limit burst=5 nodelay;
            proxy_pass https://relay_service:9000;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Relay Service 字幕 (per-session WebSocket: /subtitles/<key>)
        location /subtitles/ {
            auth_request /_auth_verify;
            proxy_pass https://relay_service:9000;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Extended timeout
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Relay Service recent subtitles history (GET /subtitles_recent/<key>)
        location /subtitles_recent/ {
            auth_request /_auth_verify;
            proxy_pass https://relay_service:9000;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Monitor Dashboard ────────────────────────────────────────────────
        # Static page served directly by nginx
        location = /monitor {
            alias /usr/share/nginx/html/monitor.html;
            default_type text/html;
            add_header Cache-Control "no-store";
        }

        # Push endpoint: authenticated by secret key inside monitor_service
        location = /monitor/update {
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://monitor_service:8080/update;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Status API polled by the frontend every 30 s
        location = /monitor/api/status {
            proxy_pass http://monitor_service:8080/status;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Cache-Control "no-store";
        }
        # ── End Monitor ──────────────────────────────────────────────────────

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location = / {
            if ($arg_src = "") {
                return 302 /login;
            }
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass https://frontend:8088;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        
        # 其他所有路徑都轉給 frontend
        location / {
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass https://frontend:8088;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

stream {
    server {
        listen 1936 ssl;
        ssl_certificate /etc/letsencrypt/live/cool-parrot.mvnl.csie.ntu.edu.tw/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cool-parrot.mvnl.csie.ntu.edu.tw/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        proxy_pass 127.0.0.1:1935;
    }
}

rtmp {
    server {
        listen 1935;
        include /etc/nginx/allowed_networks.conf;
        chunk_size 4096;

        application live {
            live on;
            record off;
            push rtmp://ome:1935/live;
        }
    }
}